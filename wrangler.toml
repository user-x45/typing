name = "typing"
main = "src/index.js"
compatibility_date = "2026-07-06"

# Durable Object binding — index.js は env.ARENA.idFromName(...) を呼んでいるので必須
[[durable_objects.bindings]]
name = "ARENA"
class_name = "Arena"

# Workers Free プランでは SQLite-backed Durable Objects のみ利用可能なため
# new_classes ではなく new_sqlite_classes を使う
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Arena"]
